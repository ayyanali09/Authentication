services:
  mongo:
    image: mongo:7
    container_name: vantanova-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vantanova-api
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: "${MONGO_URI:-mongodb://mongo:27017/vantanova}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env before starting the API}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      CLIENT_URL: "${CLIENT_URL:-http://localhost:3000}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-900000}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-120}"
      BOOTSTRAP_ADMIN_ON_START: "${BOOTSTRAP_ADMIN_ON_START:-true}"
      SEED_ADMIN_NAME: "${SEED_ADMIN_NAME:-DURON Admin}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@duron.media}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD in .env before starting the API}"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}"
    container_name: vantanova-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}"
    ports:
      - "3000:3000"

volumes:
  mongo-data:
